; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================================
; TEENSY HARDWARE ENVIRONMENT
; ============================================================================

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino

monitor_speed = 115200

lib_deps =
    ; MadgwickFilter @ ^1.0.1
    ; ICM_20948 @ ^1.0.0
    FunctionQueue @ ^1.0.0


; ============================================================================
; NATIVE PC SIMULATION - For debugging algorithms with breakpoints!
; ============================================================================

[env:native_sim]
platform = native
build_flags = 
    -std=c++11
    -g3                     ; Maximum debug information
    -O0                     ; No optimization for accurate debugging
    -DNATIVE_SIM            ; Flag to detect simulation mode
    -DDEBUG
    -I lib/helper_3dmath/include
    -I lib/MadgwickFilter/include
    -I lib/FunctionQueue/include
    -I test                 ; Include test folder for Arduino_mock.h

; Exclude hardware-specific code from simulation build
build_src_filter = 
    +<*>
    -<main.cpp>             ; Exclude Teensy main
    +<../test/>             ; Include test files

lib_deps =
    ; Only software libraries, no hardware dependencies

debug_tool = custom
debug_test = *
